<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinePrintFix — Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f7f5f2; --text: #1a1a18; --text2: #6b6b67;
      --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
      --accent: #D85A30; --accent-light: #FAECE7;
      --radius: 8px; --radius-lg: 12px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }
    nav {
      background: var(--bg); border-bottom: 0.5px solid var(--border);
      padding: 0 2rem; display: flex; align-items: center;
      justify-content: space-between; height: 56px;
      position: sticky; top: 0; z-index: 10;
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; text-decoration: none; color: var(--text); }
    .logo span { color: var(--accent); }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--text2); text-decoration: none;
      padding: 6px 12px; border-radius: var(--radius);
      border: 0.5px solid var(--border2);
      background: transparent; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }
    .back-btn:hover { background: var(--bg2); }
    .top-actions { display: flex; gap: 6px; align-items: center; }
    .icon-btn {
      background: transparent; border: 0.5px solid var(--border);
      padding: 5px 10px; border-radius: var(--radius);
      font-size: 11px; cursor: pointer; font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; gap: 4px; color: var(--text2);
    }
    .icon-btn:hover { background: var(--bg2); }
    .main { max-width: 600px; margin: 0 auto; padding: 2rem 1.5rem; }
    .results-meta {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--bg);
      border-radius: var(--radius); margin-bottom: 1.25rem;
      border: 0.5px solid var(--border);
    }
    .results-meta i { color: var(--accent); font-size: 20px; }
    .rdb-name { font-size: 13px; font-weight: 500; }
    .rdb-sub { font-size: 11px; color: var(--text2); }
    .score-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.25rem; }
    .score-card { background: var(--bg); border-radius: var(--radius); padding: 10px; text-align: center; border: 0.5px solid var(--border); }
    .score-num { font-size: 24px; font-weight: 500; line-height: 1; margin-bottom: 3px; }
    .score-label { font-size: 10px; color: var(--text2); }
    .result-tabs { display: flex; border-bottom: 0.5px solid var(--border); margin-bottom: 1rem; }
    .rtab {
      padding: 8px 14px; font-size: 12px; font-weight: 500; cursor: pointer;
      color: var(--text2); border: none; background: transparent;
      font-family: 'DM Sans', sans-serif;
      border-bottom: 2px solid transparent; margin-bottom: -0.5px;
      display: flex; align-items: center; gap: 5px; transition: color 0.12s;
    }
    .rtab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .rtab-panel { display: none; }
    .rtab-panel.active { display: block; }
    .flag-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius);
      margin-bottom: 8px; border: 0.5px solid transparent;
    }
    .flag-item.red { background: #FAECE7; border-color: #F5C4B3; }
    .flag-item.amber { background: #FAEEDA; border-color: #FAC775; }
    .flag-item.green { background: #EAF3DE; border-color: #C0DD97; }
    .flag-badge {
      font-size: 10px; font-weight: 500; padding: 2px 8px;
      border-radius: 10px; white-space: nowrap; flex-shrink: 0; margin-top: 2px;
    }
    .flag-badge.red { background: #F5C4B3; color: #712B13; }
    .flag-badge.amber { background: #FAC775; color: #633806; }
    .flag-badge.green { background: #C0DD97; color: #27500A; }
    .flag-text { font-size: 12px; line-height: 1.55; }
    .flag-clause { font-size: 10px; color: var(--text2); margin-top: 3px; }
    .section-block { margin-bottom: 8px; }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; background: var(--bg2);
      border-radius: var(--radius); cursor: pointer;
      border: 0.5px solid var(--border);
    }
    .section-header.open { border-radius: var(--radius) var(--radius) 0 0; }
    .sh-title { font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 7px; }
    .sh-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; }
    .sh-badge.warn { background: var(--accent-light); color: #993C1D; }
    .sh-badge.ok { background: #EAF3DE; color: #3B6D11; }
    .section-body {
      padding: 12px; font-size: 12px; line-height: 1.65; color: var(--text2);
      border: 0.5px solid var(--border); border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
    }
    .question-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 10px 12px; margin-bottom: 6px;
      border: 0.5px solid var(--border); border-radius: var(--radius);
      font-size: 12px; line-height: 1.55; background: var(--bg);
    }
    .q-num {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--accent-light); color: var(--accent);
      font-size: 10px; font-weight: 500;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .summary-box {
      background: var(--bg2); border-radius: var(--radius-lg);
      padding: 12px 14px; margin-bottom: 1rem;
      border: 0.5px solid var(--border); font-size: 12px; line-height: 1.65; color: var(--text2);
    }
    .loading-wrap { text-align: center; padding: 4rem 1rem; color: var(--text2); font-size: 13px; }
    .error-wrap { text-align: center; padding: 4rem 1rem; }
    .error-wrap h2 { font-size: 16px; margin-bottom: 8px; }
    .error-wrap p { font-size: 13px; color: var(--text2); }
    .disclaimer-banner {
      background: #FAEEDA; border-bottom: 0.5px solid #FAC775;
      padding: 8px 2rem; display: flex; align-items: center;
      justify-content: center; gap: 7px;
      font-size: 11px; color: #633806; text-align: center; flex-wrap: wrap;
    }
    .disclaimer-banner a { color: #633806; font-weight: 500; }
    .disclaimer-banner a:hover { text-decoration: underline; }
    .results-footer {
      border-top: 0.5px solid var(--border); padding: 1.25rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 11px; color: var(--text2); flex-wrap: wrap; gap: 8px;
      margin-top: 1rem;
    }
    .results-footer a { color: var(--text2); text-decoration: none; }
    .results-footer a:hover { color: var(--text); }
    @media (max-width: 480px) {
      .main { padding: 1.25rem 1rem; }
      nav { padding: 0 1rem; }
      .disclaimer-banner { padding: 8px 1rem; }
      .results-footer { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Fine<span>Print</span>Fix</a>
  <div class="top-actions">
    <a href="dashboard.html" class="back-btn">
      <i class="ti ti-arrow-left"></i> Dashboard
    </a>
    <button class="icon-btn" onclick="exportFullPDF()">
      <i class="ti ti-download"></i> Save PDF
    </button>
  </div>
</nav>

<div class="disclaimer-banner">
  <i class="ti ti-info-circle" style="font-size:13px;flex-shrink:0"></i>
  FinePrintFix is an AI-powered tool for informational purposes only — not a substitute for legal advice. <a href="legal.html">Learn more</a>
</div>

<div class="main" id="main-content">
  <div class="loading-wrap">
    <i class="ti ti-loader" style="font-size:24px;animation:spin 1s linear infinite;display:block;margin-bottom:10px"></i>
    Loading your analysis...
  </div>
</div>

<script>
  // ─── SUPABASE INIT ─────────────────────────────────────────────
  const SUPABASE_URL = 'https://pjtxghrbteathhxurqbk.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqdHhnaHJidGVhdGhoeHVycWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MzYzNjUsImV4cCI6MjA5NDExMjM2NX0.VFp_yTlPscnGJp1pQakclC1OZIyHybsfhacow_lG3FY';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ─── INIT ──────────────────────────────────────────────────────
  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'auth.html'; return; }

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) { showError('No analysis ID found.'); return; }

    const { data, error } = await sb
      .from('analyses')
      .select('*')
      .eq('id', id)
      .eq('user_id', session.user.id)
      .single();

    if (error || !data) {
      showError('Analysis not found or you don\'t have access to it.');
      return;
    }

    renderResults(data);
  }

  // ─── RENDER ────────────────────────────────────────────────────
  function renderResults(data) {
    const date = new Date(data.created_at).toLocaleDateString('en-US', {
      month: 'long', day: 'numeric', year: 'numeric'
    });

    document.title = `FinePrintFix — ${data.doc_name}`;

    document.getElementById('main-content').innerHTML = `
      <div class="results-meta">
        <i class="ti ti-file-text"></i>
        <div>
          <div class="rdb-name">${escHtml(data.doc_name)}</div>
          <div class="rdb-sub">Analyzed on ${date}</div>
        </div>
      </div>

      <div class="score-row">
        <div class="score-card">
          <div class="score-num" style="color:var(--accent)">${data.red_count || 0}</div>
          <div class="score-label">Red flags</div>
        </div>
        <div class="score-card">
          <div class="score-num" style="color:#BA7517">${data.amber_count || 0}</div>
          <div class="score-label">Worth asking</div>
        </div>
        <div class="score-card">
          <div class="score-num" style="color:#3B6D11">${data.green_count || 0}</div>
          <div class="score-label">Looks fine</div>
        </div>
      </div>

      <div class="result-tabs">
        <button class="rtab active" id="rtab-summary" onclick="switchTab('summary')">
          <i class="ti ti-file-description"></i> Summary
        </button>
        <button class="rtab" id="rtab-flags" onclick="switchTab('flags')">
          <i class="ti ti-flag"></i> Flags
        </button>
        <button class="rtab" id="rtab-sections" onclick="switchTab('sections')">
          <i class="ti ti-layout-list"></i> By section
        </button>
        <button class="rtab" id="rtab-questions" onclick="switchTab('questions')">
          <i class="ti ti-message-question"></i> Questions
        </button>
        <button class="rtab" id="rtab-money" onclick="switchTab('money')">
          <i class="ti ti-coin"></i> Money
        </button>
      </div>

      <div id="panel-summary" class="rtab-panel active">
        ${renderSummary(data.summary)}
      </div>
      <div id="panel-flags" class="rtab-panel">
        ${renderFlags(data.flags)}
      </div>
      <div id="panel-sections" class="rtab-panel">
        ${renderSections(data.sections)}
      </div>
      <div id="panel-questions" class="rtab-panel">
        ${renderQuestions(data.questions)}
      </div>
      <div id="panel-money" class="rtab-panel">
        ${renderMoney(data.money)}
      </div>
    `;
  }

  function renderSummary(data) {
    if (!data || !data.overview) return '<p style="font-size:13px;color:var(--text2);padding:1rem 0">No summary available for this analysis.</p>';
    const riskColor = data.overallRisk === 'high' ? '#993C1D' : data.overallRisk === 'medium' ? '#633806' : '#27500A';
    const riskBg = data.overallRisk === 'high' ? '#FAECE7' : data.overallRisk === 'medium' ? '#FAEEDA' : '#EAF3DE';
    const riskIcon = data.overallRisk === 'high' ? 'ti-alert-triangle' : data.overallRisk === 'medium' ? 'ti-info-circle' : 'ti-check';

    let html = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap;">
        <span style="font-size:11px;font-weight:500;background:var(--bg2);color:var(--text2);padding:3px 10px;border-radius:20px;border:0.5px solid var(--border)">${escHtml(data.docType || 'Legal Document')}</span>
        <span style="font-size:11px;font-weight:500;background:${riskBg};color:${riskColor};padding:3px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;">
          <i class="ti ${riskIcon}" style="font-size:10px"></i>
          ${data.overallRisk ? data.overallRisk.charAt(0).toUpperCase() + data.overallRisk.slice(1) + ' risk' : 'Unknown risk'}
        </span>
      </div>
      <div style="font-size:13px;line-height:1.7;margin-bottom:1.25rem;color:var(--text)">${escHtml(data.overview)}</div>
      ${data.riskReason ? `<div style="font-size:11px;color:${riskColor};background:${riskBg};padding:8px 12px;border-radius:var(--radius);margin-bottom:1.25rem;">${escHtml(data.riskReason)}</div>` : ''}
    `;

    if (data.keyFacts && data.keyFacts.length) {
      html += `<div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--text2);margin-bottom:8px;">Key facts</div>`;
      html += `<div style="display:flex;flex-direction:column;gap:6px;">`;
      data.keyFacts.forEach(f => {
        html += `<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 12px;background:var(--bg2);border-radius:var(--radius);border:0.5px solid var(--border);">
          <span style="font-size:11px;font-weight:500;color:var(--text2);min-width:100px;flex-shrink:0">${escHtml(f.label)}</span>
          <span style="font-size:12px;color:var(--text)">${escHtml(f.value)}</span>
        </div>`;
      });
      html += `</div>`;
    }
    return html;
  }

  function renderFlags(flags) {
    if (!flags) return '<p style="font-size:13px;color:var(--text2);padding:1rem 0">No flags data found.</p>';
    const all = [
      ...(flags.red || []).map(f => ({...f, type:'red', label:'Red flag'})),
      ...(flags.amber || []).map(f => ({...f, type:'amber', label:'Ask about'})),
      ...(flags.green || []).map(f => ({...f, type:'green', label:'Looks fine'})),
    ];
    if (!all.length) return '<p style="font-size:13px;color:var(--text2);padding:1rem 0">No significant issues found.</p>';
    return all.map(f => `
      <div class="flag-item ${f.type}">
        <span class="flag-badge ${f.type}">${f.label}</span>
        <div>
          <div class="flag-text">${escHtml(f.text)}</div>
          ${f.clause ? `<div class="flag-clause">${escHtml(f.clause)}</div>` : ''}
        </div>
      </div>
    `).join('');
  }

  function renderSections(sections) {
    if (!sections || !sections.length) return '<p style="font-size:13px;color:var(--text2);padding:1rem 0">No section data found.</p>';
    return sections.map((s, i) => {
      const icon = s.status === 'warn'
        ? '<i class="ti ti-alert-triangle" style="color:var(--accent);font-size:14px"></i>'
        : '<i class="ti ti-check" style="color:#3B6D11;font-size:14px"></i>';
      const badge = s.status === 'warn'
        ? `<span class="sh-badge warn">${s.issueCount} issue${s.issueCount !== 1 ? 's' : ''}</span>`
        : '<span class="sh-badge ok">Standard</span>';
      return `
        <div class="section-block">
          <div class="section-header" onclick="toggleSection(${i})">
            <div class="sh-title">${icon} ${escHtml(s.title)} ${badge}</div>
            <i class="ti ti-chevron-down" id="chevron-${i}" style="font-size:14px;color:var(--text2)"></i>
          </div>
          <div class="section-body" id="sbody-${i}" style="display:none">${escHtml(s.summary)}</div>
        </div>`;
    }).join('');
  }

  function renderQuestions(questions) {
    if (!questions || !questions.length) return '<p style="font-size:13px;color:var(--text2);padding:1rem 0">No questions found.</p>';
    return `<div class="summary-box">Bring these to your negotiation or review with an attorney. You don't have to accept everything as written.</div>` +
      questions.map((q, i) => `
        <div class="question-item">
          <div class="q-num">${i+1}</div>
          <div>"${escHtml(q)}"</div>
        </div>
      `).join('');
  }

  // ─── HELPERS ───────────────────────────────────────────────────
  function switchTab(tab) {
    ['summary','flags','sections','questions','money'].forEach(t => {
      document.getElementById('rtab-'+t).classList.toggle('active', t===tab);
      document.getElementById('panel-'+t).classList.toggle('active', t===tab);
    });
  }

  function renderMoney(data) {
    if (!data || !data.hasFinancials) return `<div style="text-align:center;padding:2rem 1rem;color:var(--text2);font-size:13px;">
      <i class="ti ti-coin-off" style="font-size:24px;display:block;margin-bottom:8px"></i>
      No significant financial terms found in this document.
    </div>`;

    let html = '';

    if (data.totalValue) {
      html += `<div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:1.25rem;display:flex;align-items:center;gap:10px;">
        <i class="ti ti-currency-dollar" style="color:var(--accent);font-size:20px;flex-shrink:0"></i>
        <div>
          <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--text2);margin-bottom:2px;">Total contract value</div>
          <div style="font-size:13px;font-weight:500">${escHtml(data.totalValue)}</div>
        </div>
      </div>`;
    }

    if (data.costs && data.costs.length) {
      html += `<div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--text2);margin-bottom:8px;">Costs & financial risks</div>`;
      data.costs.forEach(c => {
        const bg = c.severity==='high'?'#FAECE7':c.severity==='medium'?'#FAEEDA':'#EAF3DE';
        const color = c.severity==='high'?'#993C1D':c.severity==='medium'?'#633806':'#27500A';
        const icon = c.severity==='high'?'ti-alert-triangle':c.severity==='medium'?'ti-info-circle':'ti-check';
        html += `<div style="background:${bg};border-radius:var(--radius);padding:10px 12px;margin-bottom:8px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
            <div style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:${color};">
              <i class="ti ${icon}" style="font-size:13px"></i> ${escHtml(c.label)}
            </div>
            ${c.amount?`<span style="font-size:12px;font-weight:500;color:${color}">${escHtml(c.amount)}</span>`:''}
          </div>
          <div style="font-size:12px;line-height:1.55;color:var(--text)">${escHtml(c.description)}</div>
          ${c.negotiable?`<div style="font-size:10px;margin-top:5px;color:${color};font-weight:500;display:flex;align-items:center;gap:4px;"><i class="ti ti-pencil" style="font-size:10px"></i> Negotiable</div>`:''}
        </div>`;
      });
    }

    if (data.marketComparison && data.marketComparison.length) {
      html += `<div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--text2);margin:1.25rem 0 8px;">Market comparison</div>`;
      data.marketComparison.forEach(m => {
        const color = m.assessment==='below_market'?'#993C1D':m.assessment==='above_market'?'#27500A':'#633806';
        const bg = m.assessment==='below_market'?'#FAECE7':m.assessment==='above_market'?'#EAF3DE':'#FAEEDA';
        const label = m.assessment==='below_market'?'Below market':m.assessment==='above_market'?'Above market':'At market';
        const icon = m.assessment==='below_market'?'ti-trending-down':m.assessment==='above_market'?'ti-trending-up':'ti-minus';
        html += `<div style="border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px;background:var(--bg);">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
            <div style="font-size:12px;font-weight:500">${escHtml(m.item)}</div>
            <span style="font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;background:${bg};color:${color};display:inline-flex;align-items:center;gap:3px;">
              <i class="ti ${icon}" style="font-size:10px"></i> ${label}
            </span>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            <div style="background:var(--bg2);border-radius:var(--radius);padding:8px 10px;">
              <div style="font-size:10px;color:var(--text2);margin-bottom:2px;">This contract</div>
              <div style="font-size:12px;font-weight:500">${escHtml(m.contractValue)}</div>
            </div>
            <div style="background:var(--bg2);border-radius:var(--radius);padding:8px 10px;">
              <div style="font-size:10px;color:var(--text2);margin-bottom:2px;">Market rate</div>
              <div style="font-size:12px;font-weight:500">${escHtml(m.marketRate)}</div>
            </div>
          </div>
          ${m.gap?`<div style="font-size:11px;color:${color};margin-top:6px">${escHtml(m.gap)}</div>`:''}
        </div>`;
      });
    }

    if (data.negotiationScripts && data.negotiationScripts.length) {
      html += `<div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--text2);margin:1.25rem 0 8px;">Negotiation scripts</div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.5;">Use these word-for-word. Copy and paste into an email or say them directly.</div>`;
      data.negotiationScripts.forEach(s => {
        html += `<div style="border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;background:var(--bg);">
          <div style="padding:8px 12px;background:var(--bg2);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
            <div style="font-size:12px;font-weight:500">${escHtml(s.clause)}</div>
            ${s.potentialSaving?`<span style="font-size:10px;font-weight:500;color:#27500A;background:#EAF3DE;padding:2px 8px;border-radius:10px;">${escHtml(s.potentialSaving)}</span>`:''}
          </div>
          <div style="padding:10px 12px;">
            <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--text2);margin-bottom:4px;">Current</div>
            <div style="font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.5">${escHtml(s.currentLanguage)}</div>
            <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--accent);margin-bottom:4px;">What to say / write</div>
            <div style="font-size:12px;line-height:1.6;background:var(--accent-light);padding:10px 12px;border-radius:var(--radius);color:#712B13;font-style:italic">"${escHtml(s.suggestedLanguage)}"</div>
          </div>
        </div>`;
      });
    }

    if (data.restructuringSuggestions && data.restructuringSuggestions.length) {
      html += `<div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--text2);margin:1.25rem 0 8px;">Restructuring suggestions</div>`;
      data.restructuringSuggestions.forEach(r => {
        html += `<div style="border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px;background:var(--bg);">
          <div style="font-size:12px;font-weight:500;margin-bottom:5px">${escHtml(r.clause)}</div>
          <div style="font-size:11px;color:#993C1D;background:#FAECE7;padding:6px 10px;border-radius:var(--radius);margin-bottom:8px;line-height:1.5">${escHtml(r.issue)}</div>
          <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--text2);margin-bottom:4px;">Suggested restructure</div>
          <div style="font-size:12px;line-height:1.55;margin-bottom:6px">${escHtml(r.suggestion)}</div>
          ${r.impact?`<div style="font-size:11px;color:#27500A;background:#EAF3DE;padding:6px 10px;border-radius:var(--radius);line-height:1.5"><strong>Impact:</strong> ${escHtml(r.impact)}</div>`:''}
        </div>`;
      });
    }

    return html || '<p style="font-size:13px;color:var(--text2);padding:1rem 0">No financial analysis available.</p>';
  }

  function toggleSection(i) {
    const body = document.getElementById('sbody-'+i);
    const chevron = document.getElementById('chevron-'+i);
    const isOpen = body.style.display !== 'none';
    body.style.display = isOpen ? 'none' : 'block';
    chevron.style.transform = isOpen ? '' : 'rotate(180deg)';
  }

  function showError(msg) {
    document.getElementById('main-content').innerHTML = `
      <div class="error-wrap">
        <h2>Something went wrong</h2>
        <p>${msg}</p>
        <a href="dashboard.html" style="display:inline-block;margin-top:1rem;color:var(--accent);font-size:13px;">← Back to dashboard</a>
      </div>`;
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function exportFullPDF() {
    // Get data from rendered DOM panels
    const docName   = document.querySelector('.rdb-name')?.textContent || 'Analysis';
    const redCount  = document.querySelector('.score-card:nth-child(1) .score-num')?.textContent || '0';
    const amberCount= document.querySelector('.score-card:nth-child(2) .score-num')?.textContent || '0';
    const greenCount= document.querySelector('.score-card:nth-child(3) .score-num')?.textContent || '0';

    // Expand all collapsed accordion sections
    const collapsedBodies = [];
    document.querySelectorAll('[id^="sbody-"]').forEach(el => {
      if (el.style.display === 'none') {
        el.style.display = 'block';
        collapsedBodies.push(el);
      }
    });

    // Make all panels visible temporarily to grab their HTML
    const panels = ['panel-summary','panel-flags','panel-sections','panel-questions','panel-money'];
    const savedDisplay = {};
    panels.forEach(id => {
      const el = document.getElementById(id);
      if (el) { savedDisplay[id] = el.style.display; el.style.display = 'block'; }
    });

    const summaryHTML   = document.getElementById('panel-summary')?.innerHTML || '';
    const flagsHTML     = document.getElementById('panel-flags')?.innerHTML || '';
    const sectionsHTML  = document.getElementById('panel-sections')?.innerHTML || '';
    const questionsHTML = document.getElementById('panel-questions')?.innerHTML || '';
    const moneyHTML     = document.getElementById('panel-money')?.innerHTML || '';

    // Restore collapsed sections and panel visibility
    collapsedBodies.forEach(el => { el.style.display = 'none'; });
    panels.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = savedDisplay[id] || '';
    });

    const printWindow = window.open('', '_blank');
    printWindow.document.write(`<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>FinePrintFix — ${docName}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');
    @page { margin: 0.75in; size: letter; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    body { font-family: 'DM Sans', sans-serif; color: #1a1a18; background: #fff; font-size: 12px; line-height: 1.6; }
    .header { display: flex; align-items: flex-start; justify-content: space-between; border-bottom: 2px solid #D85A30; padding-bottom: 12px; margin-bottom: 20px; }
    .brand { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #D85A30; margin-bottom: 3px; }
    .doc-title { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
    .doc-meta { font-size: 10px; color: #6b6b67; }
    .score-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .score-card { flex: 1; border: 0.5px solid #e5e5e3; border-radius: 8px; padding: 10px 12px; text-align: center; }
    .score-num { font-size: 22px; font-weight: 700; line-height: 1; margin-bottom: 3px; }
    .score-label { font-size: 9px; color: #6b6b67; text-transform: uppercase; letter-spacing: 0.06em; }
    .section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #D85A30; border-bottom: 0.5px solid #e5e5e3; padding-bottom: 5px; margin: 24px 0 12px; page-break-before: always; }
    .section-title:first-of-type { page-break-before: avoid; }
    /* Pass through all app styles for flags, sections, money etc */
    .flag-item { border-radius: 8px; padding: 9px 12px; margin-bottom: 6px; border: 0.5px solid #e5e5e3; }
    .flag-item.red { background: #FAECE7; border-left: 3px solid #D85A30; }
    .flag-item.amber { background: #FAEEDA; border-left: 3px solid #E89A18; }
    .flag-item.green { background: #EAF3DE; border-left: 3px solid #3B6D11; }
    .flag-badge { display: inline-block; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 7px; border-radius: 20px; margin-bottom: 4px; }
    .flag-badge.red { background: #F5C4B3; color: #712B13; }
    .flag-badge.amber { background: #FAC775; color: #633806; }
    .flag-badge.green { background: #C0DD97; color: #27500A; }
    .flag-title { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
    .flag-detail { font-size: 11px; color: #4a4a48; line-height: 1.55; }
    .section-block { border: 0.5px solid #e5e5e3; border-radius: 8px; margin-bottom: 7px; overflow: hidden; page-break-inside: avoid; }
    .section-block-header { background: #f7f5f2; padding: 8px 12px; font-size: 12px; font-weight: 500; }
    .section-block-body { padding: 9px 12px; font-size: 12px; color: #4a4a48; line-height: 1.6; }
    .summary-box { background: #f7f5f2; border-radius: 8px; padding: 10px 13px; margin-bottom: 10px; font-size: 12px; line-height: 1.65; }
    table { width: 100%; border-collapse: collapse; }
    td { padding: 7px 10px; border-bottom: 0.5px solid #e5e5e3; font-size: 12px; vertical-align: top; }
    td:first-child { color: #6b6b67; width: 150px; font-weight: 500; }
    .question-item { display: flex; gap: 10px; padding: 9px 0; border-bottom: 0.5px solid #e5e5e3; page-break-inside: avoid; }
    .question-num { color: #D85A30; font-weight: 600; font-size: 13px; flex-shrink: 0; width: 20px; }
    .doc-footer { border-top: 0.5px solid #e5e5e3; margin-top: 24px; padding-top: 10px; font-size: 10px; color: #9b9b97; text-align: center; }
    /* Hide tab buttons in print */
    .rtab, button, .new-doc-btn { display: none !important; }
    .rtab-panel { display: block !important; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="brand">FinePrintFix — Document Analysis</div>
      <div class="doc-title">${docName}</div>
      <div class="doc-meta">Generated ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div>
    </div>
    <div style="text-align:right;font-size:10px;color:#6b6b67;">fineprintfix.com<br/>AI analysis · Not legal advice</div>
  </div>
  <div class="score-row">
    <div class="score-card"><div class="score-num" style="color:#D85A30">${redCount}</div><div class="score-label">Red flags</div></div>
    <div class="score-card"><div class="score-num" style="color:#BA7517">${amberCount}</div><div class="score-label">Worth asking</div></div>
    <div class="score-card"><div class="score-num" style="color:#3B6D11">${greenCount}</div><div class="score-label">Looks fine</div></div>
  </div>
  <div class="section-title" style="page-break-before:avoid">Summary</div>
  <div>${summaryHTML}</div>
  <div class="section-title">Flags &amp; Risks</div>
  <div>${flagsHTML}</div>
  <div class="section-title">By Section</div>
  <div>${sectionsHTML}</div>
  <div class="section-title">Questions to Ask</div>
  <div>${questionsHTML}</div>
  <div class="section-title">Money &amp; Financials</div>
  <div>${moneyHTML}</div>
  <div class="doc-footer">FinePrintFix · fineprintfix.com · Not legal advice — consult a qualified attorney before making legal decisions.</div>
  <script>window.onload=function(){setTimeout(function(){window.print();},1000);};<\/script>
</body>
</html>`);
    printWindow.document.close();
  }

  init();
</script>
<style>
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>

<footer class="results-footer">

  <span>AI-powered analysis for informational purposes only — not legal advice.</span>
  <span><a href="legal.html">Terms & Disclaimer</a> · <a href="legal.html#privacy">Privacy</a></span>
</footer>
</body>
</html>
